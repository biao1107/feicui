server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    uri-encoding: UTF-8

spring:
  profiles:
    active: dev
  application:
    name: feicui-backend
  # Jackson 统一序列化
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 20MB        # 单张图片上限
      max-request-size: 100MB    # 单次请求(多图)上限
  # 异步请求兜底超时(AI 匹配等 CompletableFuture 异步接口)
  mvc:
    async:
      request-timeout: 35000
  # Redis 缓存(商品详情 @Cacheable / AI 结果手动缓存)
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 5m

# ==================== MyBatis-Plus ====================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.gaocui.modules.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # 开发期打印 SQL
  global-config:
    banner: false
    db-config:
      id-type: auto             # 主键自增
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==================== Knife4j / OpenAPI3 ====================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.gaocui.modules
knife4j:
  enable: true
  setting:
    language: zh_cn

# ==================== 高翠网业务自定义配置 ====================
gaocui:
  jwt:
    secret: gaocui-feicui-secret-key-change-this-in-production-2026
    # token 有效期(秒) —— 7 天
    expire: 604800
    header: Authorization
    token-prefix: "Bearer "
  # 验证码: 有效期(秒)、长度、开发模式(控制台打印, 不真实发邮件)
  verify-code:
    expire: 300
    length: 6
    dev-print: true
  # 商家分层额度
  merchant:
    free-product-limit: 20      # 免费商家最多发布 20件
    vip-product-limit: 100     # VIP 商家最多发布 100 件
    vip-notice-days: 30        # VIP 到期前 30 天提醒
